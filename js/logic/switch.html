<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>switch example</title>
</head>

<body>
    <script>

        let month = 13;

        switch (month) {
            case 12:
            case 13:
            case 14:
                console.log("December");
                break
            case 1:
                console.log("January");
                break;
            case 2:
                console.log("February");
                break;
            case 3:
                console.log("March");
                break;
            case 4:
                console.log("April");
                break;
            case 5:
                console.log("May");
                break;
            case 6:
                console.log("June");
                break;
            case 7:
                console.log("July");
                break;
            case 8:
                console.log("August");
                break;
            case 9:
                console.log("September");
                break;
            case 10:
                console.log("October");
                break;
            case 11:
                console.log("November");
                break;
            default:
                console.log("Invalid month number")
        }

        var food = "apple";
        switch (food) {
            case "apple":
            case "banana":
            case "orange":
                console.log("fruits");
            case "carrot":
            case "potato":
                console.log("vegetables");
        }

    </script>
</body>

</html>
