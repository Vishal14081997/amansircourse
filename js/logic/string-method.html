<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <script>

        let str = 'my name is is abc';

        //NOTE length empty space also count in the length
        console.log(str.length);

        //NOTE to access specific letter using index value
        console.log(str[2]);

        //NOTE toUpperCase and toLowerCase
        console.log(str.toUpperCase());

        //NOTE toLowerCase
        console.log(str.toLowerCase());

        //NOTE charAt(कैर-एट)
        console.log(str.charAt(1));

        //NOTE indexOf
        console.log(str.indexOf('m', 1));
        let strjava = "JavaScript";
        console.log(strjava.indexOf("Python"));
        // Agar value nahi milti to -1 return hota hai.

        //NOTE includes
        console.log(str.includes('my'));

        //NOTE slice
        console.log(str.slice(4, 1));

        let str2 = "JavaScript";
        console.log(str2.slice(0, 4));

        //NOTE substring(Ye bhi slice jaisa hai.)
        console.log(str.substring(4, 1));

        console.log(str2.substring(0, 4));

        // Slice vs Substring
        console.log(str2.slice(4, 1));//""
        console.log(str2.substring(4, 1));//ava

        //NOTE replace
        console.log(str.replace('is', 'are'));

        //NOTE replaceAll
        console.log(str.replaceAll('is', 'are'));

        //NOTE split(String ko array me convert karta hai.)
        const newStr = 'we are learning js';
        const splitOutput = newStr.split(' ');
        console.log(splitOutput.reverse().join(' '));

        // Reverse String
        let str3 = "hello";
        let reverse = str3.split("").reverse().join("");
        console.log(reverse);

        //NOTE trim
        const trimString = '    my name     ';
        console.log(trimString.trim());

        //NOTE repeat
        const j = 'javascript';
        console.log(j.repeat(3));

        //NOTE padStart
        const padstring = 'hello';

        // '*****hello'
        const paddedOutputEnd = padstring.padEnd(10, '.');
        console.log(paddedOutputEnd);

        const paddedOutputStart = padstring.padStart(10, '*');
        console.log(paddedOutputStart);

         const cardNumber = '4567897868545435' ;
        const slicedNumber = cardNumber.slice(-4) ;
        console.log(slicedNumber) ;
        
        // Q. create a function to mask card number(*************4323) ;

        // startsWith
        const strtString = 'we are in the class';
        console.log(strtString.startsWith('we'));
        console.log("Hello".startsWith("A"));

        //endsWith
        const url = 'https://www.google.com';
        console.log(url.endsWith('.com'));

        // search
        console.log(url.search('p'));

        //match
        const para ="My name is Vishal";
        
        console.log(para.match('name'));

        //TODO create function which accepts a email and check if email contains @ and ends with .com return "valid email" otherwise return "invalid email please try again".

        const checkEmail = (email) => {
            return email.includes('@') && email.endsWith('.com');
        };
        console.log(checkEmail('ritesh@gmail.com'));

    </script>
</body>

</html>
